<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP - YLT | Admin Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { background-color: #050505; background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 70%); color: white; font-family: 'Outfit', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(20, 20, 25, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out, opacity 0.3s ease-in-out; opacity: 0; }
        .expandable-content.open { max-height: 500px; opacity: 1; }
        .chevron { transition: transform 0.3s ease; }
        .chevron.open { transform: rotate(180deg); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        .glass-table { width: 100%; border-collapse: collapse; text-align: left; }
        .glass-table th { background: rgba(255,255,255,0.05); padding: 12px 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #9ca3af; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .glass-table td { padding: 12px 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #d1d5db; }
        .glass-table tr:hover { background: rgba(255,255,255,0.02); }
        .os-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; display: inline-flex; align-items: center; gap: 4px;}
        .os-ios { background: rgba(255,255,255,0.1); color: #fff; }
        .os-android { background: rgba(16,185,129,0.15); color: #34d399; }
        .os-windows { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .os-unknown { background: rgba(156,163,175,0.15); color: #9ca3af; }
    </style>
</head>
<body class="p-4 md:p-10 flex justify-center min-h-screen relative overflow-x-hidden">

    <div id="main-content" class="w-full max-w-6xl flex flex-col space-y-6">
        <div class="flex flex-col md:flex-row items-center justify-between mb-2 mt-4 glass-panel p-6 rounded-3xl border-l-4 border-red-500 relative overflow-hidden">
            <div class="absolute -left-20 -top-20 w-40 h-40 bg-red-600/20 rounded-full blur-3xl"></div>
            <div class="flex items-center gap-4 z-10">
                <div class="w-14 h-14 bg-gradient-to-br from-red-600 to-orange-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(239,68,68,0.4)]">
                    <i class="fa-solid fa-server text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-300 tracking-tight">VVIP ADMIN</h1>
                    <p class="text-sm text-gray-400 uppercase tracking-widest">Master Control Center</p>
                </div>
            </div>
            <div class="flex gap-2 mt-4 md:mt-0 z-10">
                <button id="nav-manage" class="bg-red-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg transition-all"><i class="fa-solid fa-user-pen mr-2"></i> Manage User</button>
                <button id="nav-list" class="bg-black/50 text-gray-400 hover:text-white border border-white/10 px-5 py-2.5 rounded-xl text-sm font-bold transition-all"><i class="fa-solid fa-users mr-2"></i> All Users Base</button>
            </div>
        </div>

        <div id="tab-manage-content" class="space-y-6">
            <div class="glass-panel rounded-3xl overflow-hidden border border-red-900/30">
                <button id="security-trigger" class="w-full p-6 flex justify-between items-center bg-gradient-to-r from-red-900/20 to-transparent hover:bg-red-900/40 transition-colors group">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-lock text-red-400"></i>
                        <h2 class="text-lg font-bold text-gray-200 tracking-wide">Server API Settings (Auto Sync)</h2>
                    </div>
                    <i id="security-chevron" class="fa-solid fa-chevron-down text-gray-500 chevron"></i>
                </button>
                <div id="security-content" class="expandable-content bg-black/20">
                    <div class="p-6 pt-2">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                <label class="text-xs text-gray-400 uppercase tracking-widest mb-1 block">Outline API URL</label>
                                <input type="text" id="cfg-outline" class="w-full bg-black/50 border border-gray-700/50 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-red-500">
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                <label class="text-xs text-gray-400 uppercase tracking-widest mb-1 block">X-UI (VLESS) URL</label>
                                <input type="text" id="cfg-xui-url" class="w-full bg-black/50 border border-gray-700/50 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-red-500">
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                <label class="text-xs text-gray-400 uppercase tracking-widest mb-1 block">X-UI Username</label>
                                <input type="text" id="cfg-xui-user" class="w-full bg-black/50 border border-gray-700/50 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-red-500">
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                <label class="text-xs text-gray-400 uppercase tracking-widest mb-1 block">X-UI Password</label>
                                <input type="password" id="cfg-xui-pass" class="w-full bg-black/50 border border-gray-700/50 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-red-500">
                            </div>
                        </div>
                        <div class="mt-4 flex items-center">
                            <button id="btn-save-cfg" class="bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white font-bold py-2 px-6 rounded-xl transition-all shadow-lg">SAVE SERVER CONFIG</button>
                            <span id="cfg-msg" class="text-sm text-emerald-400 ml-4 hidden bg-emerald-500/10 px-3 py-1 rounded-lg border border-emerald-500/20"><i class="fa-solid fa-check mr-1"></i> Saved!</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-3xl relative overflow-hidden">
                <h2 class="text-lg font-bold mb-4 text-gray-200 tracking-wide border-b border-gray-800 pb-2"><i class="fa-solid fa-user-plus text-indigo-400 mr-2"></i> Add / Search User</h2>
                <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                    <input type="text" id="admin-username" placeholder="Enter Login ID (e.g. FREE5)" class="w-full bg-black/40 border border-gray-700/50 rounded-2xl px-4 py-4 text-white focus:outline-none focus:border-indigo-500">
                    <button id="btn-fetch" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-8 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                        FETCH <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
                <p id="status-msg" class="mt-4 text-sm hidden"></p>
            </div>

            <div id="editor-section" class="glass-panel p-6 rounded-3xl hidden relative overflow-hidden transition-all duration-500 opacity-0 transform translate-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 z-10 relative">
                    <div class="space-y-4 bg-black/30 p-5 rounded-2xl border border-indigo-500/20">
                        <h3 class="font-bold text-indigo-300"><i class="fa-solid fa-shield-halved mr-2"></i> Outline Config</h3>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Access Key (ss://)</label>
                            <input type="text" id="out-key" class="w-full bg-black/50 border border-indigo-700/50 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-indigo-400 mt-1">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Total GB Allowed</label>
                            <input type="number" id="out-total" class="w-full bg-black/50 border border-gray-700/50 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-indigo-400 mt-1">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Expire Date</label>
                            <input type="date" id="out-expire" class="w-full bg-black/50 border border-gray-700/50 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-indigo-400 mt-1" style="color-scheme:dark;">
                        </div>
                    </div>

                    <div class="space-y-4 bg-black/30 p-5 rounded-2xl border border-cyan-500/20">
                        <h3 class="font-bold text-cyan-300"><i class="fa-solid fa-network-wired mr-2"></i> VLESS Config</h3>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">VLESS Link (vless://)</label>
                            <input type="text" id="vless-key" class="w-full bg-black/50 border border-cyan-700/50 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-cyan-400 mt-1">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Total GB Allowed</label>
                            <input type="number" id="vless-total" class="w-full bg-black/50 border border-gray-700/50 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-cyan-400 mt-1">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Expire Date</label>
                            <input type="date" id="vless-expire" class="w-full bg-black/50 border border-gray-700/50 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-cyan-400 mt-1" style="color-scheme:dark;">
                        </div>
                    </div>
                </div>
                
                <button id="btn-save" class="w-full mt-6 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-4 rounded-2xl shadow-lg text-lg transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> COMMIT CHANGES TO DATABASE
                </button>

                <div class="bg-indigo-900/20 border border-indigo-500/30 p-5 rounded-2xl mt-6 hidden" id="link-generator">
                    <p class="text-xs text-indigo-300 mb-4 font-bold uppercase tracking-widest"><i class="fa-solid fa-link mr-1"></i> Direct Client Access Links</p>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-indigo-400 mb-1 block uppercase">Outline Portal Link</label>
                            <div class="flex items-center gap-3">
                                <input type="text" id="auto-link-outline" class="w-full bg-black/60 border border-indigo-500/50 rounded-xl px-4 py-3 text-sm text-indigo-100 focus:outline-none" readonly>
                                <button id="btn-copy-link-outline" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md"><i class="fa-solid fa-copy"></i></button>
                            </div>
                        </div>
                        <div>
                            <label class="text-xs text-cyan-400 mb-1 block uppercase">VLESS Portal Link</label>
                            <div class="flex items-center gap-3">
                                <input type="text" id="auto-link-vless" class="w-full bg-black/60 border border-cyan-500/50 rounded-xl px-4 py-3 text-sm text-cyan-100 focus:outline-none" readonly>
                                <button id="btn-copy-link-vless" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md"><i class="fa-solid fa-copy"></i></button>
                            </div>
                        </div>
                        <div>
                            <label class="text-xs text-purple-400 mb-1 block uppercase">General Dashboard Link (Both)</label>
                            <div class="flex items-center gap-3">
                                <input type="text" id="auto-link-user" class="w-full bg-black/60 border border-purple-500/50 rounded-xl px-4 py-3 text-sm text-purple-100 focus:outline-none" readonly>
                                <button id="btn-copy-link-user" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md"><i class="fa-solid fa-copy"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-list-content" class="space-y-6 hidden">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-black/40 border border-white/5 p-5 rounded-2xl">
                    <p class="text-xs text-gray-400 uppercase tracking-widest mb-1"><i class="fa-solid fa-users text-indigo-400 mr-1"></i> Total Users</p>
                    <h3 class="text-3xl font-bold text-white" id="stat-total">0</h3>
                </div>
                <div class="bg-black/40 border border-white/5 p-5 rounded-2xl">
                    <p class="text-xs text-gray-400 uppercase tracking-widest mb-1"><i class="fa-brands fa-android text-emerald-400 mr-1"></i> Android</p>
                    <h3 class="text-3xl font-bold text-white" id="stat-android">0</h3>
                </div>
                <div class="bg-black/40 border border-white/5 p-5 rounded-2xl">
                    <p class="text-xs text-gray-400 uppercase tracking-widest mb-1"><i class="fa-brands fa-apple text-gray-200 mr-1"></i> iOS (Apple)</p>
                    <h3 class="text-3xl font-bold text-white" id="stat-ios">0</h3>
                </div>
                <div class="bg-black/40 border border-white/5 p-5 rounded-2xl">
                    <p class="text-xs text-gray-400 uppercase tracking-widest mb-1"><i class="fa-brands fa-windows text-blue-400 mr-1"></i> PC / Mac</p>
                    <h3 class="text-3xl font-bold text-white" id="stat-pc">0</h3>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-3xl overflow-hidden">
                <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                    <h2 class="text-lg font-bold text-gray-200 tracking-wide"><i class="fa-solid fa-database text-red-400 mr-2"></i> Users Database</h2>
                    <button id="btn-refresh-list" class="text-sm text-gray-400 hover:text-white transition-colors bg-white/5 px-3 py-1.5 rounded-lg"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="glass-table w-full">
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Outline Usage</th>
                                <th>VLESS Usage</th>
                                <th>Device OS</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <tr><td colspan="5" class="text-center text-gray-500 py-4">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCiibkAoIbkTAfZRILSfx3qA2SjNFEdB5U", 
            authDomain: "vpn-pane.firebaseapp.com", 
            projectId: "vpn-pane", 
            storageBucket: "vpn-pane.firebasestorage.app", 
            messagingSenderId: "1094380249696", 
            appId: "1:1094380249696:web:d94f63c4f7170654415905" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const navManage = document.getElementById('nav-manage');
        const navList = document.getElementById('nav-list');
        const tabManageContent = document.getElementById('tab-manage-content');
        const tabListContent = document.getElementById('tab-list-content');

        navManage.addEventListener('click', () => {
            navManage.className = "bg-red-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg transition-all";
            navList.className = "bg-black/50 text-gray-400 hover:text-white border border-white/10 px-5 py-2.5 rounded-xl text-sm font-bold transition-all";
            tabManageContent.classList.remove('hidden');
            tabListContent.classList.add('hidden');
        });

        navList.addEventListener('click', () => {
            navList.className = "bg-red-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg transition-all";
            navManage.className = "bg-black/50 text-gray-400 hover:text-white border border-white/10 px-5 py-2.5 rounded-xl text-sm font-bold transition-all";
            tabListContent.classList.remove('hidden');
            tabManageContent.classList.add('hidden');
            loadAllUsers();
        });

        document.getElementById('security-trigger').addEventListener('click', () => { 
            document.getElementById('security-content').classList.toggle('open'); 
            document.getElementById('security-chevron').classList.toggle('open'); 
        });

        async function loadConfigs() {
            const snap = await getDoc(doc(db, "admin_config", "server_api"));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('cfg-outline').value = d.outline_url || ""; 
                document.getElementById('cfg-xui-url').value = d.xui_url || ""; 
                document.getElementById('cfg-xui-user').value = d.xui_user || ""; 
                document.getElementById('cfg-xui-pass').value = d.xui_pass || "";
            }
        }
        loadConfigs();

        document.getElementById('btn-save-cfg').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save-cfg');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> SAVING...';
            await setDoc(doc(db, "admin_config", "server_api"), { 
                outline_url: document.getElementById('cfg-outline').value.trim(), 
                xui_url: document.getElementById('cfg-xui-url').value.trim(), 
                xui_user: document.getElementById('cfg-xui-user').value.trim(), 
                xui_pass: document.getElementById('cfg-xui-pass').value.trim() 
            }, { merge: true });
            
            btn.innerText = "SAVE SERVER CONFIG";
            const msg = document.getElementById('cfg-msg'); 
            msg.classList.remove('hidden'); 
            setTimeout(() => msg.classList.add('hidden'), 3000);
        });

        document.getElementById('btn-fetch').addEventListener('click', async () => {
            const username = document.getElementById('admin-username').value.trim().toUpperCase(); 
            if(!username) return;
            
            document.getElementById('admin-username').value = username; 
            const statusMsg = document.getElementById('status-msg');
            const editorSec = document.getElementById('editor-section');
            
            statusMsg.classList.remove('hidden'); 
            statusMsg.className = "mt-4 text-sm bg-indigo-500/10 text-indigo-400 px-4 py-2 rounded-lg border border-indigo-500/20 inline-block";
            statusMsg.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Fetching data...';
            
            editorSec.classList.add('opacity-0', 'translate-y-4');

            const docSnap = await getDoc(doc(db, "users", username));
            if (docSnap.exists()) {
                const data = docSnap.data();
                statusMsg.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Loaded existing user: <b class="text-white">${username}</b>`;
                statusMsg.className = "mt-4 text-sm bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-lg border border-emerald-500/20 inline-block";
                
                document.getElementById('out-key').value = data.outlineKey || ""; 
                document.getElementById('out-total').value = data.outlineTotalGB || 0; 
                document.getElementById('out-expire').value = data.outlineExpireDate || "";
                document.getElementById('vless-key').value = data.vlessKey || ""; 
                document.getElementById('vless-total').value = data.vlessTotalGB || 0; 
                document.getElementById('vless-expire').value = data.vlessExpireDate || "";
            } else {
                statusMsg.innerHTML = `<i class="fa-solid fa-user-plus mr-2"></i> Creating new user profile for: <b class="text-white">${username}</b>`;
                statusMsg.className = "mt-4 text-sm bg-orange-500/10 text-orange-400 px-4 py-2 rounded-lg border border-orange-500/20 inline-block";
                document.querySelectorAll('#editor-section input[type="text"]:not(#auto-link-outline):not(#auto-link-vless):not(#auto-link-user), #editor-section input[type="number"], #editor-section input[type="date"]').forEach(inp => inp.value = "");
            }
            
            editorSec.classList.remove('hidden');
            setTimeout(() => { editorSec.classList.remove('opacity-0', 'translate-y-4'); }, 50);
            
            const baseUrl = "https://tko40575-sudo.github.io/REAL_Final/";
            document.getElementById('auto-link-outline').value = baseUrl + "outline.html?id=" + username;
            document.getElementById('auto-link-vless').value = baseUrl + "vless.html?id=" + username;
            document.getElementById('auto-link-user').value = baseUrl + "user.html?id=" + username;
            document.getElementById('link-generator').classList.remove('hidden');
        });

        function setupCopyBtn(btnId, inputId, defaultColorClass) {
            document.getElementById(btnId).addEventListener('click', () => {
                const linkInput = document.getElementById(inputId);
                linkInput.select();
                navigator.clipboard.writeText(linkInput.value).then(() => {
                    const btn = document.getElementById(btnId);
                    btn.innerHTML = '<i class="fa-solid fa-check"></i>'; 
                    btn.classList.replace(defaultColorClass, 'bg-emerald-600');
                    setTimeout(() => { 
                        btn.innerHTML = '<i class="fa-solid fa-copy"></i>'; 
                        btn.classList.replace('bg-emerald-600', defaultColorClass); 
                    }, 2000);
                });
            });
        }

        setupCopyBtn('btn-copy-link-outline', 'auto-link-outline', 'bg-indigo-600');
        setupCopyBtn('btn-copy-link-vless', 'auto-link-vless', 'bg-cyan-600');
        setupCopyBtn('btn-copy-link-user', 'auto-link-user', 'bg-purple-600');

        document.getElementById('btn-save').addEventListener('click', async () => {
            const username = document.getElementById('admin-username').value.trim().toUpperCase();
            if(!username) return alert("Please fetch a user first.");
            
            const btn = document.getElementById('btn-save'); 
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> COMMITTING...';

            await setDoc(doc(db, "users", username), {
                outlineKey: document.getElementById('out-key').value.trim(), 
                outlineTotalGB: Number(document.getElementById('out-total').value) || 0, 
                outlineExpireDate: document.getElementById('out-expire').value || "",
                vlessKey: document.getElementById('vless-key').value.trim(), 
                vlessTotalGB: Number(document.getElementById('vless-total').value) || 0, 
                vlessExpireDate: document.getElementById('vless-expire').value || ""
            }, { merge: true });

            btn.innerHTML = '<i class="fa-solid fa-check-double"></i> SUCCESS'; 
            btn.classList.replace('from-emerald-600', 'from-indigo-600');
            btn.classList.replace('to-teal-600', 'to-blue-600');
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> COMMIT CHANGES TO DATABASE';
                btn.classList.replace('from-indigo-600', 'from-emerald-600');
                btn.classList.replace('to-blue-600', 'to-teal-600');
            }, 2500);
        });

        async function loadAllUsers() {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-indigo-400 py-6"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Scanning Database...</td></tr>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                let html = "";
                let stats = { total: 0, android: 0, ios: 0, pc: 0 };

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;
                    stats.total++;

                    const os = data.deviceOS || "Unknown";
                    if (os === "Android") stats.android++;
                    else if (os === "iOS") stats.ios++;
                    else if (os === "Windows" || os === "Mac" || os === "Linux") stats.pc++;

                    let outP = data.outlineTotalGB ? Math.round((data.outlineUsedGB / data.outlineTotalGB) * 100) : 0;
                    let vlessP = data.vlessTotalGB ? Math.round((data.vlessUsedGB / data.vlessTotalGB) * 100) : 0;
                    outP = Math.min(outP, 100); vlessP = Math.min(vlessP, 100);
                    
                    const outColor = outP > 90 ? "text-red-400" : "text-indigo-400";
                    const vlessColor = vlessP > 90 ? "text-red-400" : "text-cyan-400";

                    let badge = `<span class="os-badge os-unknown"><i class="fa-solid fa-desktop"></i> Unknown</span>`;
                    if(os === "Android") badge = `<span class="os-badge os-android"><i class="fa-brands fa-android"></i> Android</span>`;
                    if(os === "iOS") badge = `<span class="os-badge os-ios"><i class="fa-brands fa-apple"></i> iOS</span>`;
                    if(os === "Windows" || os === "Mac" || os === "Linux") badge = `<span class="os-badge os-windows"><i class="fa-solid fa-laptop"></i> PC</span>`;

                    html += `
                        <tr>
                            <td>
                                <div class="font-bold text-white">${id}</div>
                                <div class="text-xs text-gray-500">${data.displayName || 'No name'}</div>
                            </td>
                            <td>
                                <div class="font-bold ${outColor}">${outP}%</div>
                                <div class="text-xs text-gray-500">${data.outlineUsedGB || 0} / ${data.outlineTotalGB || 0} GB</div>
                            </td>
                            <td>
                                <div class="font-bold ${vlessColor}">${vlessP}%</div>
                                <div class="text-xs text-gray-500">${data.vlessUsedGB || 0} / ${data.vlessTotalGB || 0} GB</div>
                            </td>
                            <td>${badge}</td>
                            <td>
                                <button onclick="editUser('${id}')" class="bg-white/10 hover:bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs transition-colors"><i class="fa-solid fa-pen"></i></button>
                            </td>
                        </tr>
                    `;
                });

                if(stats.total === 0) {
                    html = '<tr><td colspan="5" class="text-center text-gray-500 py-6">No users found in database.</td></tr>';
                }

                tbody.innerHTML = html;
                document.getElementById('stat-total').innerText = stats.total;
                document.getElementById('stat-android').innerText = stats.android;
                document.getElementById('stat-ios').innerText = stats.ios;
                document.getElementById('stat-pc').innerText = stats.pc;

            } catch (error) {
                console.error("Error loading users:", error);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-red-500 py-6">Error loading data.</td></tr>';
            }
        }

        document.getElementById('btn-refresh-list').addEventListener('click', loadAllUsers);

        window.editUser = function(userId) {
            navManage.click();
            document.getElementById('admin-username').value = userId;
            document.getElementById('btn-fetch').click();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    </script>
</body>
</html>
