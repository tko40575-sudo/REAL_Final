<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP - YLT | VLESS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { background-color: #050505; background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 70%); color: white; font-family: 'Outfit', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(20, 20, 25, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .data-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .data-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.7); }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #050505; } ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 10px; }
        .qr-wrapper { background: white; padding: 8px; border-radius: 12px; display: inline-block; transition: transform 0.3s; }
        .qr-wrapper:hover { transform: scale(1.05); } .qr-wrapper img { margin: 0 auto; border-radius: 8px; }

        /* Custom Logo Animation Overlay */
        #startup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-out, visibility 0.8s; }
        .fade-in-up { opacity: 0; transform: translateY(30px); animation: fadeInUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .delay-100 { animation-delay: 0.15s; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .progress-bar { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-4 md:p-10 flex justify-center items-center overflow-x-hidden relative">

    <div id="startup-overlay">
        <div class="relative w-32 h-32 mb-6 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-y-4 border-cyan-400 animate-spin shadow-[0_0_30px_rgba(34,211,238,0.6)]"></div>
            <div class="absolute inset-2 rounded-full border-x-4 border-teal-400 animate-[spin_2s_reverse_infinite] shadow-[0_0_20px_rgba(45,212,191,0.5)]"></div>
            <img src="https://placehold.co/200x200/050505/22d3ee?text=YLT+VPN&font=Montserrat" alt="Logo" class="w-24 h-24 rounded-full object-cover animate-pulse z-10 border border-white/10 shadow-[0_0_20px_rgba(0,0,0,0.8)]">
        </div>
        <h2 class="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-teal-400">VLESS ACCESS</h2>
        <p class="text-xs text-gray-500 mt-2 tracking-widest uppercase animate-pulse">Securing connection...</p>
    </div>

    <div class="w-full max-w-2xl flex flex-col space-y-6 opacity-0 transition-opacity duration-1000" id="main-wrapper">

        <div id="error-section" class="hidden glass-panel p-10 rounded-[2rem] text-center max-w-xl mx-auto border border-red-500/30">
            <i class="fa-solid fa-triangle-exclamation text-5xl text-red-500 mb-4 animate-bounce drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]"></i>
            <h2 class="text-2xl font-bold text-white mb-2">Invalid Access Link</h2>
            <p class="text-gray-400 text-sm">Cannot retrieve data. Please ensure you use the exact link provided by Admin.</p>
        </div>

        <div id="dashboard-section" class="hidden space-y-6">
            
            <div class="glass-panel p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4 relative overflow-hidden fade-in-up">
                <div class="absolute -right-20 -top-20 w-40 h-40 bg-cyan-600/20 rounded-full blur-3xl"></div>
                
                <div class="flex items-center gap-4 z-10 w-full md:w-auto">
                    <div class="w-14 h-14 bg-gradient-to-br from-cyan-500 to-teal-500 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(34,211,238,0.4)] border-2 border-white/10">
                        <i class="fa-solid fa-user-astronaut text-xl text-white"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Premium VLESS Client</p>
                        <h2 id="display-name" class="text-2xl font-bold text-white text-shadow-sm">Loading...</h2>
                    </div>
                </div>

                <div class="flex items-center gap-3 z-10 w-full md:w-auto">
                    <div id="device-info-badge" class="bg-black/40 border border-white/10 px-4 py-2 rounded-xl text-xs text-gray-300 flex items-center gap-2">
                        <i class="fa-solid fa-desktop" id="device-icon"></i> <span id="device-text">System</span>
                    </div>
                    <div class="bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-xl flex items-center gap-2">
                        <span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                        <span class="text-xs font-bold text-emerald-400 tracking-wider">ONLINE</span>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-8 rounded-3xl data-card relative overflow-hidden fade-in-up delay-100 flex flex-col border border-cyan-500/20">
                <div class="absolute top-0 right-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-70"></div>
                <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-cyan-500/10 rounded-full blur-2xl"></div>
                
                <div class="flex justify-between items-center mb-6 relative z-10">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-cyan-500/20 rounded-xl flex items-center justify-center text-cyan-400 border border-cyan-500/30 shadow-[0_0_15px_rgba(34,211,238,0.2)]"><i class="fa-solid fa-network-wired text-xl"></i></div>
                        <h3 class="text-xl font-bold text-gray-200 tracking-wide">VLESS (VMess) Config</h3>
                    </div>
                </div>
                
                <div class="flex-1 space-y-5 relative z-10">
                    <div class="bg-black/40 p-5 rounded-2xl border border-white/5 relative overflow-hidden transition-colors hover:bg-black/50">
                        <p class="text-xs text-gray-400 mb-2 uppercase tracking-widest flex justify-between"><span>Data Usage</span><span id="vless-percent-text" class="text-cyan-400 font-bold">0%</span></p>
                        <div class="flex items-end gap-2 mb-4"><p class="text-4xl font-extrabold text-white" style="text-shadow: 0 0 20px rgba(34,211,238,0.6);" id="vless-used-show">0</p><p class="text-sm text-gray-500 font-medium mb-1">/ <span id="vless-total-show">0</span> GB</p></div>
                        <div class="w-full bg-gray-800 rounded-full h-2 border border-gray-700/50 overflow-hidden"><div id="vless-progress" class="bg-gradient-to-r from-cyan-500 to-teal-400 h-2 rounded-full progress-bar shadow-[0_0_10px_rgba(34,211,238,0.8)]" style="width: 0%"></div></div>
                    </div>

                    <div class="bg-black/40 p-5 rounded-2xl border border-white/5 flex justify-between items-center transition-colors hover:bg-black/50">
                        <div><p class="text-xs text-gray-400 mb-1 uppercase tracking-widest">Expire Date</p><p class="text-xl font-bold text-gray-200" id="vless-expire-show">N/A</p></div>
                        <i class="fa-regular fa-clock text-cyan-500/50 text-3xl group-hover:scale-110 transition-transform"></i>
                    </div>

                    <div class="bg-cyan-900/20 p-5 rounded-2xl border border-cyan-500/30 flex items-center justify-between mt-4">
                        <div class="flex-1 mr-6">
                            <p class="text-xs text-cyan-300 mb-2 font-bold uppercase tracking-widest">Server Link (vless://)</p>
                            <input type="password" id="vless-key-hidden" class="w-full bg-black/50 border border-cyan-500/50 rounded-xl px-4 py-3 text-sm text-cyan-100 mb-4 focus:outline-none" readonly value="Loading...">
                            <button onclick="copyKey('vless-key-hidden')" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-3 rounded-xl font-bold transition-all shadow-[0_5px_15px_-5px_rgba(34,211,238,0.6)] flex items-center justify-center gap-2 hover:scale-[1.02]">
                                <i class="fa-solid fa-copy"></i> COPY VLESS LINK
                            </button>
                        </div>
                        <div id="vless-qr" class="qr-wrapper bg-white p-2 rounded-xl"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ✨ Device OS Detection Function
        function getDeviceOS() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return { name: "Android", icon: "fa-android" };
            if (/iPad|iPhone|iPod/.test(ua)) return { name: "iOS", icon: "fa-apple" };
            if (/Macintosh|Mac OS X/.test(ua)) return { name: "Mac", icon: "fa-apple" };
            if (/windows/i.test(ua)) return { name: "Windows", icon: "fa-windows" };
            if (/linux/i.test(ua)) return { name: "Linux", icon: "fa-linux" };
            return { name: "Unknown", icon: "fa-desktop" };
        }

        const currentDevice = getDeviceOS();
        document.getElementById('device-icon').className = `fa-brands ${currentDevice.icon} text-cyan-400`;
        document.getElementById('device-text').innerText = currentDevice.name;

        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyCiibkAoIbkTAfZRILSfx3qA2SjNFEdB5U", authDomain: "vpn-pane.firebaseapp.com", projectId: "vpn-pane", storageBucket: "vpn-pane.firebasestorage.app", messagingSenderId: "1094380249696", appId: "1:1094380249696:web:d94f63c4f7170654415905" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let vlessQR = new QRCode(document.getElementById("vless-qr"), { width: 120, height: 120, colorDark : "#000000", colorLight : "#ffffff" });

        function updateProgress(used, total) {
            document.getElementById('vless-used-show').innerText = used; document.getElementById('vless-total-show').innerText = total;
            let percent = total > 0 ? Math.min((used / total) * 100, 100) : 0;
            setTimeout(() => {
                document.getElementById('vless-progress').style.width = `${percent}%`; document.getElementById('vless-percent-text').innerText = `${Math.round(percent)}%`;
                if(percent > 90) { document.getElementById('vless-progress').classList.replace('from-cyan-500', 'from-red-500'); document.getElementById('vless-progress').classList.replace('to-teal-400', 'to-orange-500'); document.getElementById('vless-percent-text').classList.add('text-red-400'); }
            }, 600);
        }

        // Advanced Copy Logic
        window.copyKey = function(elementId) {
            const inputElement = document.getElementById(elementId);
            inputElement.type = 'text'; inputElement.select(); inputElement.setSelectionRange(0, 99999); 
            const valueToCopy = inputElement.value;
            if(!valueToCopy || valueToCopy.includes("No Link") || valueToCopy.includes("Loading")) { inputElement.type = 'password'; return alert("⚠️ Configuration not available yet."); }
            navigator.clipboard.writeText(valueToCopy).then(() => {
                const btn = event.currentTarget; const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED!'; btn.classList.add('bg-emerald-600');
                setTimeout(() => { btn.innerHTML = originalHtml; btn.classList.remove('bg-emerald-600'); }, 2000);
                inputElement.type = 'password';
            }).catch(err => { alert("Failed to copy automatically."); inputElement.type = 'password'; });
        };

        // Fetch User Data via URL Param
        window.addEventListener('load', () => {
            const overlay = document.getElementById('startup-overlay');
            const mainWrapper = document.getElementById('main-wrapper');
            const errorSection = document.getElementById('error-section');
            const dashboardSection = document.getElementById('dashboard-section');

            const urlParams = newSearchParams(window.location.search);
            let rawId = urlParams.get('id');

            if(!rawId) {
                setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => { overlay.style.visibility = 'hidden'; errorSection.classList.remove('hidden'); mainWrapper.classList.remove('opacity-0'); }, 800); }, 1800);
                return;
            }

            let TARGET_USER_ID = rawId.split(']')[0].split(')')[0].trim().toUpperCase();

            onSnapshot(doc(db, "users", TARGET_USER_ID), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // ✨ Write live device tracking data to Firebase
                    setDoc(doc(db, "users", TARGET_USER_ID), { 
                        lastActiveVless: new Date().toISOString(), 
                        deviceOS: currentDevice.name 
                    }, { merge: true });

                    document.getElementById('display-name').innerText = data.displayName || TARGET_USER_ID;
                    updateProgress(data.vlessUsedGB || 0, data.vlessTotalGB || 0);
                    document.getElementById('vless-expire-show').innerText = data.vlessExpireDate || "No Date";
                    document.getElementById('vless-key-hidden').value = data.vlessKey || "No Link Assigned";
                    if(data.vlessKey) vlessQR.makeCode(data.vlessKey); else vlessQR.clear();
                    
                    setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => { overlay.style.visibility = 'hidden'; dashboardSection.classList.remove('hidden'); mainWrapper.classList.remove('opacity-0'); }, 800); }, 1800);
                } else {
                    setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => { overlay.style.visibility = 'hidden'; errorSection.classList.remove('hidden'); mainWrapper.classList.remove('opacity-0'); }, 800); }, 1800);
                }
            });
        });
    </script>
</body>
</html>
